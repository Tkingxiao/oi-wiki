# 用户账号表
user:
  id: 主键
  name: 用户名
  account_number: 账号
  password: 密码哈希
  permission: 权限 (1:超级管理员, 2:管理员, 3:普通用户)
  is_banned: 是否封禁
  create_time: 创建时间
  update_time: 更新时间

# 相册
photo_album:
  id: 主键
  user_id: 创建标签的用户id（外键）
  name: 标签名
  introduction: 简介
  is_deleted: 是否删除
  is_review: 是否审核(0:未审核, 1:审核通过, 2:审核不通过)
  create_time: 创建时间
  update_time: 更新时间

# 照片
photo:
  id: 主键
  album_id: 相册id（外键）
  user_id: 创建标签的用户id（外键）
  name: 照片名
  url: 照片url
  is_deleted: 是否删除
  is_review: 是否审核(0:未审核, 1:审核通过, 2:审核不通过)
  create_time: 创建时间
  update_time: 更新时间

# 音声分类
audio_classification:
  id: 主键
  user_id: 创建标签的用户id（外键）
  name: 分类名
  is_deleted: 是否删除
  is_review: 是否审核(0:未审核, 1:审核通过, 2:审核不通过)
  create_time: 创建时间
  update_time: 更新时间

# 音声
audio:
  id: 主键
  classification_id: 音声分类id（外键）
  user_id: 创建标签的用户id（外键）
  name: 音声名
  url: 音声url
  is_deleted: 是否删除
  is_review: 是否审核(0:未审核, 1:审核通过, 2:审核不通过)
  play_count: 播放次数
  create_time: 创建时间
  update_time: 更新时间

# 直播时长
live_duration:
  id: 主键
  start_time: 开始时间
  end_time: 结束时间
  title: 标题
  create_time: 创建时间
  update_time: 更新时间

# 公告
announcement:
  id: 主键
  title: 公告标题
  content_html: 公告内容
  author: 作者
  publish_time: 发布时间
  is_pinned: 是否置顶：0-否，1-是
  category: 分类：system/feature/update/holiday
  is_deleted: 软删除标记：0-未删除，1-已删除
  create_time: 创建时间
  update_time: 更新时间

# 企划文档
plan_document:
  id: 主键
  title: 文档标题
  file_path: 文件存储路径
  file_name: 原始文件名
  upload_time: 上传时间（Unix时间戳）
  uploader_id: 上传者ID（外键）
  is_current: 是否为当前显示文档：0-否，1-是
  create_time: 创建时间
  update_time: 更新时间
